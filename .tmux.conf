set -g default-terminal "screen-256color"

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -g prefix C-t

run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux

set -g base-index 1
setw -g pane-base-index 1

unbind C-b
bind-key C-u send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

unbind [
bind v copy-mode

set -g mouse on

set-window-option -g mode-keys vi

# set-option -g status-position top

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

set -g status-position bottom

set-option -g automatic-rename off
set-option -g allow-rename off
set-option -g window-status-style "fg=#{@thm_surface_0},bg=#{@thm_overlay_0}"
set-option -g window-status-current-style "fg=#{@thm_surface_0},bg=#{@thm_mauve},bold"
set-option -g window-status-format "#[fg=#{@thm_surface_0},bg=#{@thm_overlay_0}]#[fg=#{@thm_surface_0},bg=#{@thm_overlay_0}] #I #[fg=#{@thm_overlay_0},bg=#{@thm_surface_0}]"
set-option -g window-status-current-format "#[fg=#{@thm_surface_0},bg=#{@thm_mauve}]#[fg=#{@thm_surface_0},bg=#{@thm_mauve}] #I #[fg=#{@thm_mauve},bg=#{@thm_surface_0}]"
